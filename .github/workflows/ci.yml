name: CI
permissions:
  contents: read

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Fast Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run type check
        run: bun run typecheck

      - name: Run worker tests
        run: bun run test

      - name: Run web tests
        run: bun run test:web

      - name: Run build
        run: bun run build

  supabase-smoke:
    name: Supabase Smoke
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start local Supabase
        run: bunx supabase start

      - name: Reset local database schema
        run: bun run db:migrate:local

      - name: Run Supabase smoke tests
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          SUPABASE_REQUIRED: "1"
        run: bun run test:supabase
